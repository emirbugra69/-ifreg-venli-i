<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Siber Güvenlik Lab</title>
    <style>
        :root {
            --vscode-bg: #1e1e1e;
            --vscode-input: #3c3c3c;
            --vscode-blue: #007acc;
            --vscode-text: #d4d4d4;
            --success: #4caf50;
            --warning: #ffeb3b;
            --danger: #f44336;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--vscode-bg); 
            color: var(--vscode-text); 
            margin: 0; 
            padding: 40px; 
        }
        .container { 
            max-width: 800px; 
            margin: auto; 
            border: 1px solid #333; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        h2 { color: var(--vscode-blue); margin-top: 0; }
        
        .tabs {
            display: flex;
            background: #252526;
            border-radius: 6px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab.active {
            background: var(--vscode-blue);
            color: white;
            font-weight: bold;
        }

        .input-group { margin-bottom: 20px; }
        input { 
            width: 100%; 
            padding: 12px; 
            background: var(--vscode-input); 
            border: 1px solid #555; 
            color: white; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-size: 16px; 
        }
        input:focus { border-color: var(--vscode-blue); outline: none; }

        .strength-meter { 
            height: 10px; 
            width: 100%; 
            background: #333; 
            margin: 12px 0; 
            border-radius: 4px; 
            overflow: hidden; 
        }
        #meter-fill { height: 100%; width: 0%; transition: all 0.4s; }

        .card { 
            background: #252526; 
            padding: 18px; 
            border-radius: 6px; 
            margin-top: 20px; 
            line-height: 1.6; 
        }
        .hash-box { 
            font-family: 'Courier New', monospace; 
            color: #ce9178; 
            word-break: break-all; 
            background: #1a1a1a; 
            padding: 12px; 
            border-radius: 4px; 
            border: 1px dashed #444; 
            margin-top: 8px;
        }
        button {
            padding: 10px 16px;
            background: #007acc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover { background: #005a99; }
        .copy-btn { background: #333; font-size: 0.9em; padding: 6px 12px; }
        
        .checkbox-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        .generated-pass {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 18px;
            word-break: break-all;
            text-align: center;
            margin: 15px 0;
            border: 1px solid #007acc;
        }
        .hibp-result {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔒 Siber Güvenlik Analiz Laboratuvarı</h2>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab(0)">Şifre Analizi</div>
            <div class="tab" onclick="switchTab(1)">Şifre Üret</div>
            <div class="tab" onclick="switchTab(2)">HIBP Kontrol</div>
        </div>

        <!-- TAB 1: Analiz -->
        <div id="tab0" class="tab-content">
            <div class="input-group">
                <strong>Şifre:</strong>
                <input type="password" id="passInput" placeholder="Şifrenizi girin..." autofocus>
                <div class="strength-meter">
                    <div id="meter-fill"></div>
                </div>
            </div>

            <div id="resultCard" class="card">
                <div><strong>Durum:</strong> <span id="statusText">Bekleniyor...</span></div>
                <div><strong>Entropi:</strong> <span id="entropyText">-</span> bit</div>
                <div><strong>Tahmini Kırılma Süresi:</strong> <span id="timeText">-</span></div>
            </div>

            <div class="card">
                <strong>SHA-256 Hash:</strong>
                <div id="hashValue" class="hash-box">Henüz veri yok...</div>
                <button class="copy-btn" onclick="copyHash()">📋 Kopyala</button>
            </div>
        </div>

        <!-- TAB 2: Şifre Üret -->
        <div id="tab1" class="tab-content" style="display:none;">
            <div class="card">
                <strong>Şifre Uzunluğu:</strong> 
                <input type="number" id="genLength" value="16" style="width:80px; display:inline-block;">
                
                <div class="checkbox-group">
                    <label><input type="checkbox" id="genLower" checked> a-z (küçük harf)</label>
                    <label><input type="checkbox" id="genUpper" checked> A-Z (büyük harf)</label>
                    <label><input type="checkbox" id="genNumbers" checked> 0-9 (rakam)</label>
                    <label><input type="checkbox" id="genSymbols" checked> !@#$% (sembol)</label>
                </div>
                
                <button onclick="generatePassword()">🎲 Şifre Üret</button>
                
                <div class="generated-pass" id="generatedPass">Henüz şifre üretilmedi</div>
                <button class="copy-btn" onclick="copyGenerated()">📋 Kopyala</button>
            </div>
        </div>

        <!-- TAB 3: HIBP Kontrol -->
        <div id="tab2" class="tab-content" style="display:none;">
            <div class="card">
                <strong>Şifrenizi girin (güvenli, test amaçlı):</strong>
                <input type="password" id="hibpInput" placeholder="Şifrenizi buraya yazın...">
                <button onclick="checkHIBP()">🔍 Veritabanında Ara</button>
                <div id="hibpResult" class="hibp-result">Şifre girin, sorgulayın.</div>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
